<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
</head>
<body>
    <h1>API Test Page</h1>
    <div id="results"></div>
    
    <script>
        const API_BASE_URL = 'https://linadugau-mystik-39d3.twc1.net';
        const results = document.getElementById('results');
        
        function log(message) {
            console.log(message);
            results.innerHTML += '<p>' + message + '</p>';
        }
        
        async function testAPI() {
            log('Starting API tests...');
            log('API_BASE_URL: ' + API_BASE_URL);
            
            // Test 1: Health check
            try {
                log('Testing /api/health...');
                const response = await fetch(API_BASE_URL + '/api/health');
                log('Health response status: ' + response.status);
                log('Health response headers: ' + JSON.stringify([...response.headers.entries()]));
                
                const contentType = response.headers.get('content-type');
                log('Health content-type: ' + contentType);
                
                if (contentType && contentType.includes('application/json')) {
                    const data = await response.json();
                    log('Health data: ' + JSON.stringify(data));
                } else {
                    const text = await response.text();
                    log('Health text (first 200 chars): ' + text.substring(0, 200));
                }
            } catch (error) {
                log('Health error: ' + error.message);
            }
            
            // Test 2: Quizzes
            try {
                log('Testing /api/quizzes...');
                const response = await fetch(API_BASE_URL + '/api/quizzes');
                log('Quizzes response status: ' + response.status);
                
                const contentType = response.headers.get('content-type');
                log('Quizzes content-type: ' + contentType);
                
                if (contentType && contentType.includes('application/json')) {
                    const data = await response.json();
                    log('Quizzes data: ' + JSON.stringify(data));
                } else {
                    const text = await response.text();
                    log('Quizzes text (first 200 chars): ' + text.substring(0, 200));
                }
            } catch (error) {
                log('Quizzes error: ' + error.message);
            }
            
            // Test 3: Tarot spreads
            try {
                log('Testing /api/tarot/spreads...');
                const response = await fetch(API_BASE_URL + '/api/tarot/spreads');
                log('Tarot spreads response status: ' + response.status);
                
                const contentType = response.headers.get('content-type');
                log('Tarot spreads content-type: ' + contentType);
                
                if (contentType && contentType.includes('application/json')) {
                    const data = await response.json();
                    log('Tarot spreads data: ' + JSON.stringify(data));
                } else {
                    const text = await response.text();
                    log('Tarot spreads text (first 200 chars): ' + text.substring(0, 200));
                }
            } catch (error) {
                log('Tarot spreads error: ' + error.message);
            }
        }
        
        // Запускаем тесты при загрузке страницы
        testAPI();
    </script>
</body>
</html>
