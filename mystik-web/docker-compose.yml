version: '3.8'

services:
  mystik-web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=production
      - PORT=8000
      - VITE_API_URL=http://localhost:8000
    volumes:
      # Монтируем папку с базой данных для сохранения данных
      - ./server/data:/app/mystik-web/server/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s